name: Build Nexus Quiz APK

# This tells the factory to run every time you save new code
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code from your Big Box
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up the tools to read your React code
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install all the LEGO pieces (like lucide-react)
      - name: Install dependencies
        run: npm install

      # 4. Build the web app
      - name: Build React App
        run: npm run build

      # 5. Set up the tools to build an Android app
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 6. Put the web app inside the Magic Wrapper
      - name: Add Android Platform
        run: |
          npx cap add android
          npx cap sync android

      # 7. Run the factory to create the APK
      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      # 8. Save the finished APK so you can download it
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusQuiz-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
