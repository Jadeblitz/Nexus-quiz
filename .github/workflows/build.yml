name: Build Nexus Quiz APK (v2.0 Icon Fix)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' 

      - name: Install dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21' 

      - name: Add Android Platform
        run: |
          npx cap add android
          npx cap sync android

            # 6. Generate Mobile Icons (Fixed Command)
      - name: Generate Mobile Icons
        run: npx @capacitor/assets generate --android

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexusQuiz-v2.0-FINAL
          path: android/app/build/outputs/apk/debug/app-debug.apk
